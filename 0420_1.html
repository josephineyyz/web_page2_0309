<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 20</title>
    <style>
        table {
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: grey;
            color: white;
        }

        tr:nth-child(odd) td {
            background-color: white;
        }

        tr:nth-child(even) td {
            background-color: yellow;
        }

        .fixed-box {
            position: fixed;
            top: 20px;
            right: 20px;
            border: 3px solid green;
            padding: 15px;
            width: 150px;
            background-color: white;
        }
    </style>
</head>

<body>

    <table>
        <tr>
            <th>Firstname</th>
            <th>Lastname</th>
        </tr>
        <tr>
            <td>1</td>
            <td>1</td>
        </tr>
        <tr>
            <td>2</td>
            <td>2</td>
        </tr>
        <tr>
            <td>3</td>
            <td>3</td>
        </tr>
    </table>

    <div class="fixed-box">
        This div <br> 
        element has<br>
        position: fixed;
    </div>

</body>
</html>
