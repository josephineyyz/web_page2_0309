<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Circle and Rectangle</title>
  <style>
    .canvas {
      position: relative;
      width: 220px;
      height: 150px;
    }

    .rectangle {
      position: absolute;
      left: 10px;
      top: 10px;
      width: 120px;
      height: 120px;
      background-color: blue;
      border: 4px solid black;
    }

    .circle {
      position: absolute;
      left: 80px;
      top: 10px;
      width: 100px;
      height: 100px;
      background-color: yellow;
      border: 4px solid red;
      border-radius: 50%;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="rectangle"></div>
    <div class="circle"></div>
  </div>
</body>
</html>
