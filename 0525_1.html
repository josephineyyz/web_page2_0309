<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Circle Calculator</title>

<style>
    body{
        font-family: Arial, sans-serif;
        text-align:center;
        background-color:#f4f4f4;
        margin-top:50px;
    }

    .container{
        width:400px;
        margin:auto;
        background:white;
        padding:30px;
        border-radius:10px;
        box-shadow:0px 0px 10px rgba(0,0,0,0.2);
    }

    h1{
        color:#333;
    }

    input{
        padding:10px;
        width:200px;
        font-size:16px;
        margin:10px;
    }

    button{
        padding:10px 20px;
        font-size:16px;
        cursor:pointer;
        background-color:#007bff;
        color:white;
        border:none;
        border-radius:5px;
    }

    button:hover{
        background-color:#0056b3;
    }

    #result{
        margin-top:20px;
        font-size:18px;
        font-weight:bold;
    }
</style>

</head>

<body>

<div class="container">

    <h1>Circle Calculator</h1>

    <p>Enter Radius:</p>

    <input type="number" id="radius" placeholder="Enter radius">

    <br>

    <button onclick="showResults()">
        Calculate
    </button>

    <div id="result"></div>

</div>

<script>

    // Function to calculate circumference
    function calcCircumference(radius){

        let circumference = 2 * Math.PI * radius;

        return "The circumference is " + 
               circumference.toFixed(2);

    }


    // Function to calculate area
    function calcArea(radius){

        let area = Math.PI * radius * radius;

        return "The area is " + 
               area.toFixed(2);

    }


    // Display results
    function showResults(){

        let radius = document.getElementById(
            "radius"
        ).value;

        if(radius==="" || radius<=0){

            document.getElementById(
                "result"
            ).innerHTML=
            "Please enter a valid radius.";

            return;
        }

        let result1 = calcCircumference(radius);

        let result2 = calcArea(radius);

        document.getElementById(
            "result"
        ).innerHTML=
        result1 + "<br><br>" + result2;

    }

</script>

</body>
</html>
